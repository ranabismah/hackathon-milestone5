<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shareable Resume </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Shareable Resume</h1>
    <form id="resume-form">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter your Username" required>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>
        </fieldset>
        <fieldset>
            <legend>Education</legend>
            <label for="education">Education:</label>
            <textarea id="education" placeholder="Enter your Education" rows="3" required></textarea>
        </fieldset>
        <fieldset>
            <legend>Experience</legend>
            <label for="experience">Experience:</label>
            <textarea id="experience" placeholder="Enter your Experience" rows="4" required></textarea>
        </fieldset>
        <fieldset>
            <legend>Skills</legend>
            <label for="skills">Skills:</label>
            <textarea id="skills" placeholder="Enter your skills" rows="2" required></textarea>
        </fieldset>
        <button type="submit"><b>Generate Resume</b></button>
    </form>
    <br>
    <!-- Editable nResume display area -->
    <div id="resume-display" contenteditable="true">
        <!--  Editable Resume content will be inserted here -->
    </div>

    <br>
    <!--creating shareable link and download button-->
    <div id="shareable-link-container" style="display: none;">
        <h2>Shareable link</h2>
        <p>here is your link to view or edit Resume</p>
        <a href="#" id="shareable-link" target="_blank"></a>
    <br>
    <button id="download-pdf"><b>download as pdf </b></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
